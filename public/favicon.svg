<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Board/table shape -->
  <rect x="12" y="28" width="40" height="22" rx="3" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Board legs -->
  <line x1="20" y1="50" x2="20" y2="56" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44" y1="50" x2="44" y2="56" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Check mark inside board -->
  <polyline points="22,39 28,45 42,32" fill="none" stroke="#FCD34D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Star/crown above -->
  <polygon points="32,8 34.5,15 42,15 36,19.5 38.5,27 32,22.5 25.5,27 28,19.5 22,15 29.5,15" fill="#FCD34D"/>
</svg>
