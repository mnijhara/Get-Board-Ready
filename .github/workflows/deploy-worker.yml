name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
  workflow_dispatch:

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload Worker via Cloudflare API
        run: |
          curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/9d53a46d5cfed7dff60ac5f9bd9d6b8e/workers/scripts/red-credit-6798" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/javascript" \
            --data-binary @worker/index.js | python3 -c "import json,sys; d=json.load(sys.stdin); print('SUCCESS' if d.get('success') else f'FAILED: {d}')"

      - name: Set Worker Secrets
        run: |
          set_secret() {
            curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/9d53a46d5cfed7dff60ac5f9bd9d6b8e/workers/scripts/red-credit-6798/secrets" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"$1\", \"text\": \"$2\", \"type\": \"secret_text\"}" | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'$1: OK' if d.get('success') else f'$1: FAIL {d.get(\"errors\")}')"
          }
          set_secret "RAZORPAY_KEY_ID" "${{ secrets.RAZORPAY_KEY_ID }}"
          set_secret "RAZORPAY_KEY_SECRET" "${{ secrets.RAZORPAY_KEY_SECRET }}"
          set_secret "RAZORPAY_WEBHOOK_SECRET" "${{ secrets.RAZORPAY_WEBHOOK_SECRET }}"
          set_secret "FIREBASE_PROJECT_ID" "${{ secrets.FIREBASE_PROJECT_ID }}"
          set_secret "FIREBASE_DATABASE_ID" "${{ secrets.FIREBASE_DATABASE_ID }}"
          set_secret "FIREBASE_API_KEY" "${{ secrets.FIREBASE_API_KEY }}"
          set_secret "GEMINI_API_KEY" "${{ secrets.GEMINI_API_KEY }}"
