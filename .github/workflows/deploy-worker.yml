name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
  workflow_dispatch:

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        run: wrangler deploy worker/index.js --name red-credit-6798 --compatibility-date 2024-01-01
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 9d53a46d5cfed7dff60ac5f9bd9d6b8e

      - name: Set Secrets
        run: |
          echo "${{ secrets.RAZORPAY_KEY_ID }}" | wrangler secret put RAZORPAY_KEY_ID --name red-credit-6798
          echo "${{ secrets.RAZORPAY_KEY_SECRET }}" | wrangler secret put RAZORPAY_KEY_SECRET --name red-credit-6798
          echo "${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" | wrangler secret put RAZORPAY_WEBHOOK_SECRET --name red-credit-6798
          echo "${{ secrets.FIREBASE_PROJECT_ID }}" | wrangler secret put FIREBASE_PROJECT_ID --name red-credit-6798
          echo "${{ secrets.FIREBASE_DATABASE_ID }}" | wrangler secret put FIREBASE_DATABASE_ID --name red-credit-6798
          echo "${{ secrets.FIREBASE_API_KEY }}" | wrangler secret put FIREBASE_API_KEY --name red-credit-6798
          echo "${{ secrets.GEMINI_API_KEY }}" | wrangler secret put GEMINI_API_KEY --name red-credit-6798
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 9d53a46d5cfed7dff60ac5f9bd9d6b8e
